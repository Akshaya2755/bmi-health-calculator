<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: #020617;
        }

        .logo {
            color: #38bdf8;
            font-weight: bold;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        .container {
            text-align: center;
            margin-top: 60px;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            margin: auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            background: #334155;
            color: white;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">💙 BMI Health</div>

    <div class="nav-links">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</div>

<div class="container">

    <h2>BMI Calculator</h2>

    <div class="box">
        <form method="POST">

            <input type="number" step="0.01" name="height" placeholder="Height (in meters)" required>
            <input type="number" step="0.01" name="weight" placeholder="Weight (in kg)" required>

            <button type="submit">Calculate</button>
        </form>

        {% if bmi %}
        <div class="result">
            <h3>BMI: {{ bmi }}</h3>
            <h3 style="color: {{ color }}">{{ category }}</h3>
            <p>{{ tip }}</p>
        </div>
        {% endif %}
    </div>

</div>

</body>
</html>
