<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: #020617;
        }

        .logo {
            color: #38bdf8;
            font-weight: bold;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        .container {
            text-align: center;
            margin-top: 80px;
        }

        h1 {
            font-size: 30px;
        }

        .cards {
            display: flex;
            justify-content: center;
            margin-top: 40px;
            gap: 30px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 220px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #22c55e;
            color: white;
            border-radius: 6px;
            text-decoration: none;
        }

        .card a:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">💙 BMI Health</div>

    <div class="nav-right">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>

        <div class="profile-menu">
            👤
            <div class="dropdown">
                <a href="{{ url_for('profile') }}">My Profile</a>
                <a href="{{ url_for('edit_profile') }}">Edit Profile</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <h1>Welcome to Your Dashboard</h1>
    <p>Manage your health easily</p>

    <div class="cards">

        <div class="card">
            <h3>BMI Calculator</h3>
            <p>Check your BMI instantly</p>
            <a href="{{ url_for('bmi') }}">Open</a>
        </div>

        <div class="card">
            <h3>History</h3>
            <p>View past BMI records</p>
            <a href="{{ url_for('history') }}">View</a>
        </div>

    </div>
</div>

</body>
</html>
